    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: #333;
            line-height: 1.8;
        }
        .header-navy {
            background-color: #003366; 
        }
        .text-navy {
            color: #003366;
        }
        .bg-navy-light {
            background-color: #f0f4f8;
        }
        .border-navy {
            border-color: #003366;
        }
        /* メニューアニメーション */
        #main-menu {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(-20px);
            opacity: 0;
            pointer-events: none;
        }
        #main-menu.active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .hero-overlay {
            background: linear-gradient(rgba(0,51,102,0.7), rgba(0,51,102,0.4));
        }

        /* スポイラー（アコーディオン）スタイル */
        .spoiler-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .spoiler-item.active .spoiler-content {
            max-height: 3000px;
            padding-bottom: 1.5rem;
        }
        .spoiler-item.active .spoiler-icon {
            transform: rotate(180deg);
        }

        /* 画像付きバナーボックスのスタイル */
        .banner-box {
            position: relative;
            height: 240px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        @media (min-width: 1024px) {
            .banner-box {
                height: 300px;
            }
        }
        .banner-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .banner-box img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .banner-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }
        .banner-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 15px;
        }
        .cepo-logo-circle {
            width: 70px;
            height: 70px;
            background: rgba(0, 31, 63, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        @media (min-width: 768px) {
            .cepo-logo-circle {
                width: 90px;
                height: 90px;
            }
        }
        .banner-text-bottom {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            font-weight: 500;
            letter-spacing: 0.02em;
            font-size: 0.75rem;
            padding: 0 12px;
            line-height: 1.5;
        }
        @media (min-width: 768px) {
            .banner-text-bottom {
                bottom: 25px;
                font-size: 1rem;
            }
        }

        /* ページ切り替えの表示制御 */
        .page-view {
            display: none;
        }
        .page-view.active {
            display: block;
        }
    </style>
</head>
